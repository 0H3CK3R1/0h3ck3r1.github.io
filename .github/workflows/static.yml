<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 BES Länderquiz – 10 Jahre Jubiläum</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4A843;
    --gold-light: #F0C96B;
    --gold-dark: #A07830;
    --dark: #0D1117;
    --dark2: #161B22;
    --dark3: #21262D;
    --text: #E8E8E8;
    --text-muted: #8B949E;
    --green: #2EA043;
    --red: #F85149;
    --blue: #58A6FF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---- STARFIELD ---- */
  #starfield {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(ellipse at 50% 0%, #1a1025 0%, #0D1117 60%);
  }

  /* ---- LAYOUT ---- */
  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* ---- HEADER ---- */
  .header {
    text-align: center;
    padding: 48px 0 36px;
  }
  .header .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--dark);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 20px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    font-weight: 900;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }
  .header p {
    color: var(--text-muted);
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* ---- GLOBE DECORATION ---- */
  .globe-wrap {
    display: flex;
    justify-content: center;
    margin: 8px 0 28px;
  }
  .globe-svg {
    width: 72px;
    height: 72px;
    animation: spin 20s linear infinite;
    filter: drop-shadow(0 0 18px rgba(212,168,67,0.4));
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- PROGRESS BAR ---- */
  .progress-wrap {
    margin-bottom: 28px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .progress-bar-bg {
    background: var(--dark3);
    border-radius: 10px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
    border-radius: 10px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* ---- CARD ---- */
  .card {
    background: var(--dark2);
    border: 1px solid rgba(212,168,67,0.18);
    border-radius: 20px;
    padding: 28px 28px 24px;
    margin-bottom: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    animation: slideUp 0.45s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---- FLAG IMAGE ---- */
  .flag-container {
    text-align: center;
    margin-bottom: 22px;
  }
  .flag-img {
    width: 160px;
    height: 106px;
    object-fit: cover;
    border-radius: 10px;
    border: 2px solid rgba(212,168,67,0.3);
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  .flag-placeholder {
    width: 160px;
    height: 106px;
    border-radius: 10px;
    border: 2px dashed rgba(212,168,67,0.3);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    background: var(--dark3);
  }

  .question-num {
    font-size: 0.75rem;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .type-badge {
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(212,168,67,0.15);
    color: var(--gold);
    border: 1px solid rgba(212,168,67,0.25);
  }
  .question-text {
    font-size: 1.15rem;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 22px;
    color: #fff;
  }

  /* ---- OPTIONS ---- */
  .options {
    display: grid;
    gap: 10px;
  }
  .option-btn {
    background: var(--dark3);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 18px;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--gold);
    background: rgba(212,168,67,0.08);
    transform: translateX(4px);
  }
  .option-btn .opt-label {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.8rem;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.2s;
  }
  .option-btn.correct {
    border-color: var(--green);
    background: rgba(46,160,67,0.12);
    animation: pulse-green 0.4s ease;
  }
  .option-btn.correct .opt-label {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }
  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(248,81,73,0.10);
  }
  .option-btn.wrong .opt-label {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  .option-btn.reveal-correct {
    border-color: var(--green);
    background: rgba(46,160,67,0.07);
  }
  @keyframes pulse-green {
    0%   { box-shadow: 0 0 0 0 rgba(46,160,67,0.5); }
    100% { box-shadow: 0 0 0 12px rgba(46,160,67,0); }
  }

  /* ---- FEEDBACK ---- */
  .feedback {
    margin-top: 18px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.5;
    display: none;
  }
  .feedback.correct-fb {
    background: rgba(46,160,67,0.12);
    border: 1px solid rgba(46,160,67,0.3);
    color: #7ee787;
  }
  .feedback.wrong-fb {
    background: rgba(248,81,73,0.10);
    border: 1px solid rgba(248,81,73,0.3);
    color: #ffa198;
  }
  .feedback .fb-icon { font-size: 1.2rem; margin-right: 6px; }

  /* ---- NEXT BUTTON ---- */
  .next-btn {
    display: none;
    width: 100%;
    margin-top: 16px;
    padding: 15px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none;
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .next-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(212,168,67,0.35);
  }

  /* ---- SCORE CARD ---- */
  .score-card {
    display: none;
    text-align: center;
    padding: 40px 24px;
  }
  .score-emoji {
    font-size: 5rem;
    margin-bottom: 16px;
    animation: bounce 0.6s cubic-bezier(.36,.07,.19,.97) both;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    40% { transform: translateY(-20px); }
    60% { transform: translateY(-10px); }
  }
  .score-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--gold-light);
    margin-bottom: 8px;
  }
  .score-subtitle {
    color: var(--text-muted);
    margin-bottom: 28px;
    font-size: 0.95rem;
  }
  .score-big {
    font-size: 4rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 4px;
  }
  .score-max {
    color: var(--text-muted);
    font-size: 1rem;
    margin-bottom: 28px;
  }
  .score-bar-wrap {
    background: var(--dark3);
    border-radius: 12px;
    height: 12px;
    max-width: 320px;
    margin: 0 auto 28px;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
    border-radius: 12px;
    transition: width 1s 0.4s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }
  .score-message {
    font-size: 1.05rem;
    color: var(--text);
    margin-bottom: 32px;
    font-weight: 300;
  }
  .restart-btn {
    padding: 14px 40px;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none;
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .restart-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(212,168,67,0.4);
  }

  /* ---- REVIEW ---- */
  .review-section {
    display: none;
    margin-top: 28px;
  }
  .review-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--gold-light);
    margin-bottom: 16px;
    text-align: center;
  }
  .review-item {
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 10px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .review-icon { font-size: 1.3rem; flex-shrink: 0; margin-top: 2px; }
  .review-q { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; }
  .review-a { font-size: 0.95rem; font-weight: 500; }
  .review-a.r-correct { color: #7ee787; }
  .review-a.r-wrong { color: #ffa198; }
  .review-correct-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

  /* ---- WELCOME ---- */
  .welcome {
    text-align: center;
    padding: 20px 0 10px;
  }
  .welcome p {
    color: var(--text-muted);
    font-size: 0.95rem;
    line-height: 1.7;
    max-width: 520px;
    margin: 0 auto 28px;
  }
  .start-btn {
    padding: 16px 52px;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none;
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 24px rgba(212,168,67,0.3);
    transition: all 0.2s;
  }
  .start-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 36px rgba(212,168,67,0.45);
  }

  /* ---- DIVIDER ---- */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0 20px;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(212,168,67,0.15); }
  .divider-icon { color: var(--gold); font-size: 1rem; }

  /* ---- COUNTRY CHIPS ---- */
  .country-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .chip {
    background: var(--dark3);
    border: 1px solid rgba(212,168,67,0.2);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="container">
  <div class="header">
    <div class="badge">✦ 10 Jahre BES ✦</div>
    <h1>Länder der<br>Welt Quiz</h1>
    <p>Jubiläumsausgabe 2026</p>
  </div>

  <div class="globe-wrap">
    <svg class="globe-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="45" fill="none" stroke="#D4A843" stroke-width="1.5" opacity="0.6"/>
      <ellipse cx="50" cy="50" rx="25" ry="45" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.4"/>
      <ellipse cx="50" cy="50" rx="45" ry="20" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.4"/>
      <line x1="5" y1="50" x2="95" y2="50" stroke="#D4A843" stroke-width="1" opacity="0.3"/>
      <line x1="50" y1="5" x2="50" y2="95" stroke="#D4A843" stroke-width="1" opacity="0.3"/>
      <circle cx="50" cy="50" r="6" fill="#D4A843" opacity="0.9"/>
      <circle cx="50" cy="50" r="3" fill="#F0C96B"/>
    </svg>
  </div>

  <!-- WELCOME SCREEN -->
  <div id="welcomeScreen" class="card welcome">
    <p>Teste dein Wissen über die Heimatländer unserer Schülerinnen und Schüler. <br><strong>26 Fragen</strong> erwarten dich – Hauptstädte, Sprachen, Geschichte, Geografie, Kultur und mehr.</p>
    <div class="country-chips" id="countryChips"></div>
    <button class="start-btn" onclick="startQuiz()">Quiz starten 🚀</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quizScreen" style="display:none">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="progressText">Frage 1 von 13</span>
        <span id="scoreText">0 Punkte</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
    </div>

    <div class="card" id="questionCard">
      <div class="flag-container" id="flagContainer"></div>
      <div class="question-num" id="questionNum"></div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Weiter →</button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="resultScreen" style="display:none">
    <div class="card score-card" id="scoreCard">
      <div class="score-emoji" id="scoreEmoji"></div>
      <div class="score-title" id="scoreTitle"></div>
      <div class="score-subtitle">Dein Ergebnis beim BES Jubiläumsquiz</div>
      <div class="score-big" id="scoreBig"></div>
      <div class="score-max" id="scoreMax"></div>
      <div class="score-bar-wrap"><div class="score-bar-fill" id="scoreBarFill"></div></div>
      <div class="score-message" id="scoreMessage"></div>
      <button class="restart-btn" onclick="restartQuiz()">🔄 Nochmal spielen</button>
    </div>
    <div class="review-section" id="reviewSection">
      <div class="divider"><div class="divider-line"></div><div class="divider-icon">✦</div><div class="divider-line"></div></div>
      <div class="review-title">Deine Antworten im Überblick</div>
      <div id="reviewItems"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// STARFIELD — layered twinkle + drift + shooting stars
// ============================================================
(function() {
  const c = document.getElementById('starfield');
  const ctx = c.getContext('2d');
  let W, H, stars = [], shooters = [], tick = 0;

  function resize() {
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
  }

  function mkStar() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.6 + 0.2,
      phase: Math.random() * Math.PI * 2,
      twinkleSpeed: Math.random() * 0.018 + 0.004,
      drift: (Math.random() - 0.5) * 0.06,
      color: Math.random() < 0.15 ? [180,200,255] : Math.random() < 0.1 ? [255,220,180] : [212,168,67],
    };
  }

  function init() {
    resize();
    stars = Array.from({length: 200}, mkStar);
    shooters = [];
  }

  function spawnShooter() {
    const angle = Math.PI / 6 + Math.random() * Math.PI / 8; // diagonal down-right
    const speed = 6 + Math.random() * 8;
    return {
      x: Math.random() * W * 0.7,
      y: Math.random() * H * 0.4,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      len: 80 + Math.random() * 120,
      alpha: 1,
      trail: []
    };
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    tick++;

    // Spawn shooting star randomly
    if (Math.random() < 0.003) shooters.push(spawnShooter());

    // Draw stars
    stars.forEach(s => {
      s.phase += s.twinkleSpeed;
      s.x += s.drift;
      if (s.x > W + 2) s.x = -2;
      if (s.x < -2) s.x = W + 2;

      const alpha = (Math.sin(s.phase) + 1) / 2;
      const minA = 0.08, maxA = 0.85;
      const a = minA + alpha * (maxA - minA);
      const [r, g, b] = s.color;

      // Glow for brighter stars
      if (s.r > 1.1 && alpha > 0.6) {
        const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 4);
        grd.addColorStop(0, `rgba(${r},${g},${b},${a * 0.4})`);
        grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 4, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
      ctx.fill();
    });

    // Draw shooting stars
    shooters = shooters.filter(s => s.alpha > 0.02);
    shooters.forEach(s => {
      s.trail.push({x: s.x, y: s.y});
      if (s.trail.length > 22) s.trail.shift();

      // Draw trail
      for (let i = 0; i < s.trail.length - 1; i++) {
        const progress = i / s.trail.length;
        const a = progress * s.alpha * 0.7;
        ctx.beginPath();
        ctx.moveTo(s.trail[i].x, s.trail[i].y);
        ctx.lineTo(s.trail[i+1].x, s.trail[i+1].y);
        ctx.strokeStyle = `rgba(255,240,200,${a})`;
        ctx.lineWidth = progress * 2.5;
        ctx.stroke();
      }

      // Head glow
      const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 4);
      grd.addColorStop(0, `rgba(255,255,240,${s.alpha})`);
      grd.addColorStop(1, `rgba(255,220,150,0)`);
      ctx.beginPath();
      ctx.arc(s.x, s.y, 4, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();

      s.x += s.vx;
      s.y += s.vy;
      s.alpha -= 0.015;

      // Fade out if offscreen
      if (s.x > W || s.y > H) s.alpha = 0;
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', init);
  init(); draw();
})();

// ============================================================
// QUIZ DATA
// ============================================================
const COUNTRIES = [
  { name: 'Afghanistan', flag: 'https://flagcdn.com/w160/af.png', emoji: '🇦🇫' },
  { name: 'Syrien',      flag: 'https://flagcdn.com/w160/sy.png', emoji: '🇸🇾' },
  { name: 'Somalia',     flag: 'https://flagcdn.com/w160/so.png', emoji: '🇸🇴' },
  { name: 'Eritrea',     flag: 'https://flagcdn.com/w160/er.png', emoji: '🇪🇷' },
  { name: 'Ukraine',     flag: 'https://flagcdn.com/w160/ua.png', emoji: '🇺🇦' },
  { name: 'Nigeria',     flag: 'https://flagcdn.com/w160/ng.png', emoji: '🇳🇬' },
  { name: 'Iran',        flag: 'https://flagcdn.com/w160/ir.png', emoji: '🇮🇷' },
  { name: 'Irak',        flag: 'https://flagcdn.com/w160/iq.png', emoji: '🇮🇶' },
  { name: 'Lettland',    flag: 'https://flagcdn.com/w160/lv.png', emoji: '🇱🇻' },
  { name: 'Argentinien', flag: 'https://flagcdn.com/w160/ar.png', emoji: '🇦🇷' },
  { name: 'Jemen',       flag: 'https://flagcdn.com/w160/ye.png', emoji: '🇾🇪' },
  { name: 'Philippinen', flag: 'https://flagcdn.com/w160/ph.png', emoji: '🇵🇭' },
  { name: "Elfenbeinküste", flag: 'https://flagcdn.com/w160/ci.png', emoji: '🇨🇮' },

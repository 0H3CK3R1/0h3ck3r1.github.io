// ============================================================
// QUIZ STATE
// ============================================================
let questions = [];
let currentIdx = 0;
let score = 0;
let answers = [];
let answered = false;

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildQuestions() {
  // Two questions per country, randomly chosen from pool, no duplicates
  const byCountry = {};
  QUESTION_POOL.forEach(q => {
    if (!byCountry[q.country]) byCountry[q.country] = [];
    byCountry[q.country].push(q);
  });
  const picked = [];
  COUNTRIES.forEach(c => {
    const pool = shuffle(byCountry[c.name] || []);
    picked.push(...pool.slice(0, 2));
  });
  return shuffle(picked);
}

// Populate country chips in welcome screen
function populateChips() {
  const wrap = document.getElementById('countryChips');
  COUNTRIES.forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = c.emoji + ' ' + c.name;
    wrap.appendChild(chip);
  });
}

function startQuiz() {
  questions = buildQuestions();
  currentIdx = 0;
  score = 0;
  answers = [];
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  renderQuestion();
}

function typeLabel(t) {
  const map = { capital:'🏛 Hauptstadt', geography:'🗺 Geografie', language:'💬 Sprache', history:'📜 Geschichte', culture:'🎭 Kultur', politics:'⚖️ Politik' };
  return map[t] || t;
}

function renderQuestion() {
  answered = false;
  const q = questions[currentIdx];
  const total = questions.length;

  // Progress
  document.getElementById('progressText').textContent = `Frage ${currentIdx+1} von ${total}`;
  document.getElementById('scoreText').textContent = `${score} Punkt${score!==1?'e':''}`;
  document.getElementById('progressBar').style.width = `${(currentIdx/total)*100}%`;

  // Flag
  const flagContainer = document.getElementById('flagContainer');
  const country = COUNTRIES.find(c => c.name === q.country);
  if (country) {
    const img = document.createElement('img');
    img.className = 'flag-img';
    img.src = country.flag;
    img.alt = `Flagge von ${q.country}`;
    img.onerror = function() {
      this.style.display = 'none';
      const ph = document.createElement('div');
      ph.className = 'flag-placeholder';
      ph.textContent = country.emoji;
      flagContainer.appendChild(ph);
    };
    flagContainer.innerHTML = '';
    flagContainer.appendChild(img);
  }

  document.getElementById('questionNum').innerHTML = `Frage ${currentIdx+1} <span class="type-badge">${typeLabel(q.type)}</span>`;
  document.getElementById('questionText').textContent = q.question;

  // Options
  const optContainer = document.getElementById('optionsContainer');
  optContainer.innerHTML = '';
  const opts = shuffle([q.correct, ...q.wrong]);
  const labels = ['A','B','C','D'];
  opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-label">${labels[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(opt, q.correct, q.fact, opts);
    optContainer.appendChild(btn);
  });

  // Hide feedback & next
  const fb = document.getElementById('feedback');
  fb.style.display = 'none';
  fb.className = 'feedback';
  document.getElementById('nextBtn').style.display = 'none';

  // Re-animate card
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = ''; });
}

function selectAnswer(chosen, correct, fact, opts) {
  if (answered) return;
  answered = true;
  const isCorrect = chosen === correct;
  if (isCorrect) score++;

  answers.push({ question: questions[currentIdx].question, country: questions[currentIdx].country, chosen, correct, isCorrect });

  // Style buttons
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(btn => {
    btn.disabled = true;
    const text = btn.querySelector('span:last-child').textContent;
    if (text === correct) btn.classList.add('correct');
    else if (text === chosen && !isCorrect) btn.classList.add('wrong');
  });

  // Feedback
  const fb = document.getElementById('feedback');
  if (isCorrect) {
    fb.className = 'feedback correct-fb';
    fb.innerHTML = `<span class="fb-icon">✅</span><strong>Richtig!</strong> ${fact}`;
  } else {
    fb.className = 'feedback wrong-fb';
    fb.innerHTML = `<span class="fb-icon">❌</span><strong>Leider falsch.</strong> Die richtige Antwort ist: <strong>${correct}</strong>. ${fact}`;
  }
  fb.style.display = 'block';

  document.getElementById('scoreText').textContent = `${score} Punkt${score!==1?'e':''}`;
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('quizScreen').style.display = 'none';
  const rs = document.getElementById('resultScreen');
  rs.style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score/total)*100);

  let emoji, title, message;
  if (pct === 100) { emoji='🏆'; title='Perfekt!'; message='Beeindruckend! Du kennst alle Länder unserer Schülerinnen und Schüler.'; }
  else if (pct >= 77) { emoji='🌟'; title='Ausgezeichnet!'; message='Klasse! Du weißt wirklich viel über die Herkunftsländer unserer Gemeinschaft.'; }
  else if (pct >= 54) { emoji='👍'; title='Gut gemacht!'; message='Nicht schlecht! Du hast schon gutes Wissen über unsere Länder.'; }
  else if (pct >= 31) { emoji='📚'; title='Weiter lernen!'; message='Du hast die Grundlagen. Mit ein bisschen mehr Übung wirst du zum Experten!'; }
  else { emoji='🌍'; title='Übung macht den Meister!'; message='Jede Reise beginnt mit einem ersten Schritt. Versuche es noch einmal!'; }

  document.getElementById('scoreEmoji').textContent = emoji;
  document.getElementById('scoreTitle').textContent = title;
  document.getElementById('scoreBig').textContent = score;
  document.getElementById('scoreMax').textContent = `von ${total} möglichen Punkten`;
  document.getElementById('scoreMessage').textContent = message;

  const sc = document.getElementById('scoreCard');
  sc.style.display = 'block';

  setTimeout(() => {
    document.getElementById('scoreBarFill').style.width = pct+'%';
  }, 100);

  // Review
  const reviewWrap = document.getElementById('reviewItems');
  reviewWrap.innerHTML = '';
  answers.forEach(a => {
    const item = document.createElement('div');
    item.className = 'review-item';
    const countryObj = COUNTRIES.find(c => c.name === a.country);
    const emoji2 = countryObj ? countryObj.emoji : '🌍';
    item.innerHTML = `
      <div class="review-icon">${a.isCorrect ? '✅' : '❌'}</div>
      <div>
        <div class="review-q">${emoji2} ${a.country} · ${a.question}</div>
        <div class="review-a ${a.isCorrect ? 'r-correct' : 'r-wrong'}">${a.chosen}</div>
        ${!a.isCorrect ? `<div class="review-correct-label">Richtig: ${a.correct}</div>` : ''}
      </div>`;
    reviewWrap.appendChild(item);
  });

  document.getElementById('reviewSection').style.display = 'block';
}

function restartQuiz() {
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('reviewSection').style.display = 'none';
  document.getElementById('scoreCard').style.display = 'none';
  document.getElementById('scoreBarFill').style.width = '0%';
  document.getElementById('reviewItems').innerHTML = '';
  startQuiz();
}

// INIT
populateChips();
</script>
</body>
</html>
